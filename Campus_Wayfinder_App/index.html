<!DOCTYPE html>
<html lang="en">
<head>

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Federation University Walking Navigation
    </title>

    <!-- LEAFLET -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <!-- ROUTING MACHINE -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"
    />

    <!-- CUSTOM CSS -->

    <link
        rel="stylesheet"
        href="style.css"
    />
	
	
	<link
       rel="stylesheet"
       href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
     />

</head>

<body>
    <!-- MAP -->

    <div id="map"></div>

    <!-- BOTTOM NAVIGATION -->

    <footer class="bottom-nav">

        <button>
            <i class="fa-solid fa-map"></i>
            Map
        </button>

        <button onclick="openMenu()">
            <i class="fa-solid fa-location-dot"></i>
            Points of Interest
        </button>

        <button>
            <i class="fa-solid fa-building"></i>
            Buildings
        </button>

    </footer>

    <!-- POINT OF INTEREST MENU WITH ICONS -->

    <div id="poiMenu" class="menu">

        <h2>
            Points of Interest
        </h2>

<ul class="poi-list">

    <li class="poi-item" data-poi="toilets">
        <span class="poi-text">Toilets</span>
        <i class="fa-solid fa-restroom poi-icon"></i>
    </li>

    <li class="poi-item" data-poi="buildings">
        <span class="poi-text">Building Locations</span>
        <i class="fa-solid fa-building poi-icon"></i>
    </li>

    <li class="poi-item" data-poi="parking">
        <span class="poi-text">Parking</span>
        <i class="fa-solid fa-square-parking poi-icon"></i>
    </li>

    <li class="poi-item" data-poi="elevators">
        <span class="poi-text">Elevator</span>
        <i class="fa-solid fa-elevator poi-icon"></i>
    </li>

    <li class="poi-item" data-poi="water">
        <span class="poi-text">Water Station</span>
        <i class="fa-solid fa-faucet poi-icon"></i>
    </li>

    <li class="poi-item" data-poi="fed_living">
        <span class="poi-text">Fed Living</span>
        <i class="fa-solid fa-house poi-icon"></i>
    </li>

</ul>

        <button onclick="closeMenu()" class="close-btn">
            Close
        </button>

    </div>

    <!-- LEAFLET -->

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- ROUTING MACHINE -->

    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <!-- APP -->

    <script src="app.js"></script>
	
	


</body>
</html>
